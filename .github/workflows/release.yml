name: release

# Tag a version to ship binaries:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # The matrix upload jobs attach assets to an existing GitHub Release, so create
  # it first (idempotent — safe to re-run a tag).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags so the changelog can diff versions
      - name: Generate notes + create/update the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/changelog.sh "$GITHUB_REF_NAME" > notes.md
          echo "----- release notes -----"; cat notes.md; echo "-------------------------"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --notes-file notes.md
          fi

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5
      # Builds (cross-compiling musl/aarch64 via `cross` automatically), packages
      # `bohay-<tag>-<target>.{tar.gz,zip}` + a .sha256, and uploads them to the
      # Release created above.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: bohay
          target: ${{ matrix.target }}
          archive: bohay-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build the macOS notch companion app (separate repo RizRiyz/bohay-notch),
  # ad-hoc sign it (no paid Apple Developer account, so no Developer ID cert and
  # no notarization), attach the DMG to THIS bohay release, and bump the
  # Homebrew cask in RizRiyz/homebrew-bohay.
  #
  # Because the app is unsigned/unnotarized, Gatekeeper will block it on first
  # launch — the cask carries a caveat telling users how to get past that.
  #
  # Extra repo secrets required (in addition to GITHUB_TOKEN):
  #   NOTCH_TOKEN  PAT (repo:read) to check out RizRiyz/bohay-notch
  #   TAP_TOKEN    PAT (repo) to push to RizRiyz/homebrew-bohay
  notch:
    name: bohay-notch.dmg
    needs: create-release
    runs-on: macos-15
    env:
      SCHEME: bohay-notch
      APP_NAME: bohay-notch
      TAP_REPO: RizRiyz/homebrew-bohay
    steps:
      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check out bohay-notch source
        uses: actions/checkout@v5
        with:
          repository: RizRiyz/bohay-notch
          path: notch
          token: ${{ secrets.NOTCH_TOKEN }}

      - name: Build .app (universal, ad-hoc signed)
        working-directory: notch
        run: |
          # No Developer ID identity available — build unsigned, then apply a
          # deep ad-hoc signature (required or arm64 macOS refuses to launch it).
          xcodebuild build \
            -project bohay-notch.xcodeproj -scheme "$SCHEME" \
            -configuration Release -derivedDataPath "$RUNNER_TEMP/dd" \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.v.outputs.version }}" \
            CODE_SIGN_IDENTITY="-" CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""
          APP="$RUNNER_TEMP/dd/Build/Products/Release/$APP_NAME.app"
          codesign --force --deep --sign - "$APP"
          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Build DMG
        id: dmg
        run: |
          VER="${{ steps.v.outputs.version }}"
          DMG="bohay-notch-$VER.dmg"
          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "bohay-notch" -srcfolder "$STAGE" \
            -fs HFS+ -format UDZO -ov "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Attach DMG to this bohay release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "${{ steps.dmg.outputs.dmg }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Bump Homebrew cask
        run: |
          VER="${{ steps.v.outputs.version }}"
          SHA="$(shasum -a 256 "${{ steps.dmg.outputs.dmg }}" | cut -d' ' -f1)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" "$RUNNER_TEMP/tap"
          CASK="$RUNNER_TEMP/tap/Casks/bohay-notch.rb"
          sed -i '' -E "s/^  version \".*\"/  version \"$VER\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA\"/" "$CASK"
          cd "$RUNNER_TEMP/tap"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "bohay-notch $VER"
          git push
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
