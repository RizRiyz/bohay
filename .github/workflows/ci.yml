name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Harden dependency downloads: retry transient failures and disable HTTP/2
  # multiplexing, which causes intermittent crates.io "HTTP2 framing layer"
  # download errors on GitHub runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # `-D warnings` is scoped to clippy on our own crate — NOT a global
      # RUSTFLAGS, which would also fail on harmless dependency warnings.
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked

  # macOS is the primary platform (notch companion, Apple-silicon binaries) -
  # run the full test suite there too, not just at release-tag time.
  macos:
    name: macos test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  windows:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked

  # Known-vulnerability scan of the dependency tree (RustSec advisory DB).
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  # Validate the Nix flake (packaging for NixOS / `nix run`). Evaluates every
  # output and builds the package, so a broken derivation fails CI instead of
  # only surfacing when a Nix user tries to install. Reproducible once flake.lock
  # is committed; until then it resolves nixos-unstable fresh each run.
  nix:
    name: nix flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # `flake check` type-checks/evaluates all outputs; `build` compiles the
      # package so the wrapped binary is proven to link.
      - run: nix flake check --print-build-logs
      - run: nix build --print-build-logs
